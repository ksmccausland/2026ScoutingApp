<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  margin:0;
  padding:16px;
}

.app{
  max-width:700px;
  margin:auto;
  background:white;
  border-radius:20px;
  padding:28px;
  box-shadow:0 8px 24px rgba(0,0,0,0.15);
}

h1{
  text-align:center;
  margin-bottom:24px;
  font-size:2rem;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}

label{
  display:block;
  font-weight:bold;
  margin-bottom:8px;
  font-size:1.2rem;
}

input[type="number"]{
  width:100%;
  padding:16px;
  font-size:1.3rem;
  border:1px solid #ccc;
  border-radius:12px;
}

.phase-title{
  font-weight:bold;
  font-size:1.35rem;
  text-align:left;
  margin-bottom:8px;
}

.counter-card{
  border:1px solid #ddd;
  border-radius:16px;
  padding:18px;
  margin-bottom:20px;
}

.auto-card{
  background:rgba(255,0,0,0.08);
}

.teleop-card{
  background:rgba(0,100,255,0.08);
}

.center-label{
  text-align:center;
  font-weight:bold;
  font-size:1.2rem;
  margin-bottom:10px;
}

.counter-controls{
  display:grid;
  grid-template-columns:120px 1fr 120px;
  gap:16px;
  align-items:center;
}

.counter-value{
  text-align:center;
  font-size:3rem;
  font-weight:bold;
  padding:18px;
  background:white;
  border-radius:14px;
  min-height:82px;
  display:flex;
  align-items:center;
  justify-content:center;
}

button{
  border:none;
  border-radius:14px;
  padding:20px 12px;
  font-size:2.2rem;
  font-weight:bold;
  cursor:pointer;
  min-height:82px;
}

.minus-btn{
  background:#dc2626;
  color:white;
}

.plus-btn{
  background:#2563eb;
  color:white;
}

.submit-btn{
  width:100%;
  background:#059669;
  color:white;
  margin-top:12px;
  font-size:1.8rem;
  min-height:76px;
}

.auto-climb-wrap{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.auto-climb-title{
  font-weight:bold;
  font-size:1.2rem;
  text-align:center;
  margin-bottom:10px;
}

.auto-climb-check{
  display:flex;
  justify-content:center;
  align-items:center;
}

.auto-climb-check input[type="checkbox"]{
  width:26px;
  height:26px;
}

.end-climb-wrap{
  margin-top:18px;
}

.end-climb-title{
  font-weight:bold;
  font-size:1.2rem;
  text-align:center;
  margin-bottom:10px;
}

.radio-row{
  display:flex;
  gap:24px;
  font-size:1.2rem;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
}

.radio-row label{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:0;
  font-weight:bold;
}

input[type="radio"]{
  width:22px;
  height:22px;
}

.status{
  margin-top:16px;
  font-weight:bold;
  text-align:center;
  font-size:1.1rem;
  min-height:28px;
}

@media (max-width:640px){
  .row{
    grid-template-columns:1fr;
    gap:16px;
  }

  .counter-controls{
    grid-template-columns:100px 1fr 100px;
    gap:12px;
  }

  .counter-value{
    font-size:2.4rem;
  }

  button{
    font-size:2rem;
  }
}

</style>
</head>

<body>

<div class="app">

<h1>Ball Scouting App</h1>

<form id="scoutingForm">

<div class="row">
  <div>
    <label>Match #</label>
    <input type="number" id="matchNumber" min="1" required>
  </div>

  <div>
    <label>Team #</label>
    <input type="number" id="teamNumber" min="1" required>
  </div>
</div>

<div class="phase-title">Autonomous</div>
<div class="counter-card auto-card">

  <div class="center-label">Balls Scored</div>

  <div class="counter-controls">
    <button type="button" class="minus-btn" onclick="changeCounter('autoCount',-1)">-</button>
    <div class="counter-value" id="autoCountDisplay">0</div>
    <button type="button" class="plus-btn" onclick="changeCounter('autoCount',1)">+</button>
  </div>

  <div class="auto-climb-wrap">
    <div class="auto-climb-title">Auto Climb</div>
    <div class="auto-climb-check">
      <input type="checkbox" id="autoClimb">
    </div>
  </div>

</div>

<div class="phase-title">Teleop</div>
<div class="counter-card teleop-card">

  <div class="center-label">Balls Scored</div>

  <div class="counter-controls">
    <button type="button" class="minus-btn" onclick="changeCounter('teleopCount',-1)">-</button>
    <div class="counter-value" id="teleopCountDisplay">0</div>
    <button type="button" class="plus-btn" onclick="changeCounter('teleopCount',1)">+</button>
  </div>

  <div class="end-climb-wrap">
    <div class="end-climb-title">End Game Climb</div>
    <div class="radio-row">
      <label><input type="radio" name="endClimb" value="L1">L1</label>
      <label><input type="radio" name="endClimb" value="L2">L2</label>
      <label><input type="radio" name="endClimb" value="L3">L3</label>
    </div>
  </div>

</div>

<input type="hidden" id="autoCount" value="0">
<input type="hidden" id="teleopCount" value="0">

<button type="submit" class="submit-btn" id="submitBtn">Submit</button>

</form>

<div id="status" class="status"></div>

</div>

<script>

function changeCounter(id,delta){
  const input=document.getElementById(id)
  const display=document.getElementById(id+"Display")

  let value=parseInt(input.value||"0",10)
  value+=delta
  if(value<0)value=0

  input.value=value
  display.textContent=value
}

function getEndClimb(){
  const selected=document.querySelector('input[name="endClimb"]:checked')
  return selected?selected.value:""
}

document.getElementById("scoutingForm").addEventListener("submit",function(e){
  e.preventDefault()

  const matchNumber=document.getElementById("matchNumber").value
  const teamNumber=document.getElementById("teamNumber").value
  const autoCount=document.getElementById("autoCount").value
  const teleopCount=document.getElementById("teleopCount").value
  const autoClimb=document.getElementById("autoClimb").checked
  const endClimb=getEndClimb()

  const status=document.getElementById("status")
  const submitBtn=document.getElementById("submitBtn")

  if(!matchNumber||!teamNumber){
    status.textContent="Please fill Match # and Team #"
    return
  }

  submitBtn.disabled=true
  status.textContent="Submitting..."

  google.script.run
    .withSuccessHandler(function(){
      status.textContent="Submitted"

      document.getElementById("scoutingForm").reset()
      document.getElementById("autoCount").value=0
      document.getElementById("teleopCount").value=0
      document.getElementById("autoCountDisplay").textContent="0"
      document.getElementById("teleopCountDisplay").textContent="0"
      document.getElementById("matchNumber").focus()

      submitBtn.disabled=false
    })
    .withFailureHandler(function(error){
      status.textContent="Error: "+error.message
      submitBtn.disabled=false
    })
    .submitScoutData({
      matchNumber:Number(matchNumber),
      teamNumber:Number(teamNumber),
      ballsScoredAuto:Number(autoCount),
      ballsScoredTeleop:Number(teleopCount),
      autoClimb:autoClimb,
      endClimb:endClimb
    })
})

</script>

</body>
</html>
